name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install deps (for peer-dep smoke test)
        run: npm install --no-audit --no-fund
      - name: Syntax check (node --check)
        run: |
          shopt -s globstar
          for f in src/**/*.mjs; do
            echo "checking $f"
            node --check "$f"
          done
        shell: bash
      - name: Import smoke test
        run: node -e "import('./src/index.mjs').then(m => { if (!m.captureScreenshots || !m.inspectLayout || !m.compareScreenshots) throw new Error('missing exports'); console.log('exports ok'); })"
      - name: Unit tests
        run: npm test
